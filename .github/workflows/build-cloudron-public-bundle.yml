name: Build Cloudron Public Bundle

on:
  workflow_dispatch:

jobs:
  build-public-bundle:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Package Cloudron public bundle
        shell: pwsh
        run: |
          ./scripts/package-cloudron-public.ps1 `
            -OutputZip "$env:RUNNER_TEMP/cloudron-public.zip" `
            -StagingRoot "$env:RUNNER_TEMP/cloudron-public"

      - name: Upload deployable public bundle
        uses: actions/upload-artifact@v4
        with:
          name: cloudron-public-bundle
          path: ${{ runner.temp }}/cloudron-public.zip
          if-no-files-found: error
