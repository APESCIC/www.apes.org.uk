name: Validate Public Site

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-public-site:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Validate shared PHP rendering and public routes
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\validate-public-site.ps1
