# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "www.apes.org.uk"

[setup]
script = ""

[setup.win32]
script = '''
Set-Location $env:CODEX_WORKTREE_PATH

Write-Host "Installing Python dependencies..."
if (Test-Path "requirements.txt") {
    py -m pip install -r requirements.txt
} else {
    Write-Host "No requirements.txt found, skipping Python install."
}

Write-Host "Installing Node dependencies..."
if (Test-Path "package-lock.json") {
    npm ci
} elseif (Test-Path "package.json") {
    npm install
} else {
    Write-Host "No package.json found, skipping npm install."
}

Write-Host "Running project setup script..."
if (Test-Path ".\run\setup.ps1") {
    powershell -ExecutionPolicy Bypass -File ".\run\setup.ps1"
} elseif (Test-Path ".\run\setup.sh") {
    bash ".\run\setup.sh"
} else {
    Write-Host "No setup script found, skipping."
}
'''

[cleanup]
script = ""

[cleanup.win32]
script = '''
Set-Location $env:CODEX_WORKTREE_PATH

if (Get-Command docker -ErrorAction SilentlyContinue) {
    docker compose down --remove-orphans
}

Remove-Item -Recurse -Force ".cache\tmp" -ErrorAction SilentlyContinue
'''

[[actions]]
name = "Install dependencies"
icon = "run"
command = "npm install"

[[actions]]
name = "Run dev server"
icon = "run"
command = "npm run dev"
